server {
    listen 80;
    server_name _;

    location / {
        # ВАЖНО: Nginx переводит запросы из / в /guacamole/ внутри докера
        proxy_pass http://guacamole:8080/guacamole/;
        
        # Если Guacamole пытается сделать редирект (301/302) на /guacamole, 
        # мы перехватываем это и меняем обратно на /
        proxy_redirect /guacamole/ /;
        proxy_redirect /guacamole /;

        # Обязательные заголовки для работы WebSockets (без них не будет картинки)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Стандартные заголовки прокси
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгие таймауты, чтобы не обрывались сессии RDP/VNC
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # МАГИЯ: Nginx на лету ищет в коде страницы ссылки вида '="/guacamole/'
        # и заменяет их на '="/', чтобы браузер не видел этот префикс
        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript;
        sub_filter '="/guacamole/' '="/';
        sub_filter '="/guacamole' '="/';
    }
}
